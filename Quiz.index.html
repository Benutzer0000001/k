<!Quiz>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Interaktives Quiz</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f2f5; padding: 20px; }
        #main-wrapper { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 90%; max-width: 640px; text-align: center; }
        
        input { padding: 12px; width: 80%; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        button { padding: 12px 24px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; transition: background 0.3s; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }

        #quiz-container, #intro-container, #leaderboard, #already-done { display: none; }
        #login-container { display: block; }

        .options { list-style: none; padding: 0; }
        .options li { margin: 10px 0; padding: 15px; background: #f8f9fa; cursor: pointer; border-radius: 6px; border: 1px solid #ddd; transition: 0.2s; }
        .options li:hover { background: #e9ecef; border-color: #bbb; }
        
        #leaderboard table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        #leaderboard th, #leaderboard td { border-bottom: 1px solid #ddd; padding: 12px; text-align: left; }
        
        h2 { color: #333; }
        p { color: #666; }
    </style>
</head>
<body>

<div id="main-wrapper">
    <div id="already-done">
        <h2>Du hast bereits teilgenommen!</h2>
        <p>Hier ist die aktuelle Bestenliste:</p>
        <button onclick="showLeaderboardOnly()">Bestenliste ansehen</button>
    </div>

    <div id="login-container">
        <h2>Willkommen zum Quiz!</h2>
        <p>Gib deinen Namen ein, um zu starten:</p>
        <input type="text" id="username" placeholder="Dein Name...">
        <br>
        <button onclick="showIntro()">Weiter</button>
    </div>

    <div id="intro-container">
        <h2>Bereit?</h2>
        <p>Die Fragen erscheinen in zufälliger Reihenfolge.</p>
        <button onclick="startQuiz()">Quiz starten</button>
    </div>

    <div id="quiz-container">
        <h3 id="question-text"></h3>
        <ul id="options-list" class="options"></ul>
        <p id="progress"></p>
    </div>

    <div id="leaderboard">
        <h2>Globale Ergebnisse</h2>
        <table id="score-table">
            <thead>
                <tr><th>Name</th><th>Punkte</th></tr>
            </thead>
            <tbody id="score-body"></tbody>
        </table>
        <br>
        <p><i>Hinweis: Mehrfachteilnahme ist deaktiviert.</i></p>
    </div>
</div>

<script>
    const quizDataRaw = [
        { q: "Was ist die Hauptstadt von Frankreich?", o: ["Berlin", "Paris", "Rom", "Madrid"], c: 1 },
        { q: "Welcher Planet ist der 'Rote Planet'?", o: ["Venus", "Mars", "Jupiter", "Saturn"], c: 1 },
        { q: "Wie viele Bundesländer hat Deutschland?", o: ["12", "14", "16", "18"], c: 2 }
    ];

    let quizData = [];
    let currentUser = "";
    let currentQuestionIndex = 0;
    let score = 0;

    // DOM Elemente
    const loginDiv = document.getElementById('login-container');
    const introDiv = document.getElementById('intro-container');
    const quizDiv = document.getElementById('quiz-container');
    const boardDiv = document.getElementById('leaderboard');
    const doneDiv = document.getElementById('already-done');

    // Prüfen, ob der User das Quiz schon mal gemacht hat
    window.onload = function() {
        if (localStorage.getItem('quiz_finished') === 'true') {
            loginDiv.style.display = "none";
            doneDiv.style.display = "block";
        }
    };

    // Fisher-Yates Shuffle zum Mischen der Fragen
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function showIntro() {
        currentUser = document.getElementById('username').value;
        if(currentUser.trim() === "") {
            alert("Bitte gib einen Namen ein!");
            return;
        }
        loginDiv.style.display = "none";
        introDiv.style.display = "block";
    }

    function startQuiz() {
        // Fragen mischen bei Start
        quizData = shuffleArray([...quizDataRaw]);
        introDiv.style.display = "none";
        quizDiv.style.display = "block";
        loadQuestion();
    }

    function loadQuestion() {
        const currentData = quizData[currentQuestionIndex];
        document.getElementById('question-text').innerText = currentData.q;
        document.getElementById('progress').innerText = `Frage ${currentQuestionIndex + 1} von ${quizData.length}`;
        
        const list = document.getElementById('options-list');
        list.innerHTML = ""; 

        currentData.o.forEach((opt, index) => {
            let li = document.createElement('li');
            li.innerText = opt;
            li.onclick = () => handleAnswer(index);
            list.appendChild(li);
        });
    }

    function handleAnswer(selected) {
        // Die korrekte Antwort muss im gemischten Array trotzdem gefunden werden
        if(selected === quizData[currentQuestionIndex].c) {
            score++;
        }

        currentQuestionIndex++;
        if(currentQuestionIndex < quizData.length) {
            loadQuestion();
        } else {
            finishQuiz();
        }
    }

    function finishQuiz() {
        quizDiv.style.display = "none";
        boardDiv.style.display = "block";
        
        // Marker setzen: User hat fertig
        localStorage.setItem('quiz_finished', 'true');

        saveScore(currentUser, score);
        displayLeaderboard();
    }

    function showLeaderboardOnly() {
        doneDiv.style.display = "none";
        boardDiv.style.display = "block";
        displayLeaderboard();
    }

    // --- LOGIK FÜR DIE BESTENLISTE ---
    
    function saveScore(name, points) {
        // Lokal speichern (für das eigene Gerät)
        let allScores = JSON.parse(localStorage.getItem('quizScores')) || [];
        allScores.push({ name: name, points: points });
        allScores.sort((a, b) => b.points - a.points);
        localStorage.setItem('quizScores', JSON.stringify(allScores));

        // HINWEIS: Um es auf ALLEN Smartphones zu sehen, müsstest du hier 
        // eine API wie Firebase oder Supabase anbinden. 
        // Ohne Server bleiben die Daten lokal auf dem Handy.
    }

    function displayLeaderboard() {
        const allScores = JSON.parse(localStorage.getItem('quizScores')) || [];
        const tbody = document.getElementById('score-body');
        tbody.innerHTML = "";

        allScores.forEach(entry => {
            let row = `<tr><td>${entry.name}</td><td>${entry.points} / ${quizDataRaw.length}</td></tr>`;
            tbody.innerHTML += row;
        });
    }
</script>

</body>
</html>
